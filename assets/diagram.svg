<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3a1a6e"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#4752c4"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" opacity="0.9">How Audio Retransmission Works</text>

  <!-- Box 1: PC Audio -->
  <rect x="30" y="80" width="170" height="90" rx="12" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="115" y="115" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">PC Audio</text>
  <text x="115" y="137" text-anchor="middle" fill="#94a3b8" font-size="11">Music / Games / Video</text>
  <text x="115" y="155" text-anchor="middle" fill="#94a3b8" font-size="11">on your second monitor</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="125" x2="250" y2="125" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Box 2: Virtual Cable -->
  <rect x="260" y="80" width="170" height="90" rx="12" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="345" y="115" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Virtual Audio Cable</text>
  <text x="345" y="137" text-anchor="middle" fill="#94a3b8" font-size="11">VB-Audio / VoiceMeeter</text>
  <text x="345" y="155" text-anchor="middle" fill="#94a3b8" font-size="11">Routes audio internally</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="125" x2="480" y2="125" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Box 3: Bot + FFmpeg -->
  <rect x="490" y="80" width="170" height="90" rx="12" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="575" y="110" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Discord Bot</text>
  <text x="575" y="132" text-anchor="middle" fill="#dbeafe" font-size="11">FFmpeg low-latency</text>
  <text x="575" y="150" text-anchor="middle" fill="#dbeafe" font-size="11">capture + stream</text>

  <!-- Arrow 3 -->
  <line x1="670" y1="125" x2="710" y2="125" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Box 4: Devices -->
  <rect x="720" y="80" width="155" height="90" rx="12" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="797" y="110" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Your Devices</text>
  <text x="797" y="132" text-anchor="middle" fill="#fecaca" font-size="11">PS5 / Phone / Tablet</text>
  <text x="797" y="150" text-anchor="middle" fill="#fecaca" font-size="11">via Discord voice</text>

  <!-- Bottom info boxes -->
  <rect x="80" y="210" width="220" height="75" rx="10" fill="#0f3460" opacity="0.5"/>
  <text x="190" y="237" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">Zero Config Audio</text>
  <text x="190" y="257" text-anchor="middle" fill="#94a3b8" font-size="10">Captures everything your</text>
  <text x="190" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">PC plays — no per-app setup</text>

  <rect x="340" y="210" width="220" height="75" rx="10" fill="#533483" opacity="0.5"/>
  <text x="450" y="237" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600">Ultra-Low Latency</text>
  <text x="450" y="257" text-anchor="middle" fill="#94a3b8" font-size="10">Tuned FFmpeg pipeline with</text>
  <text x="450" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">minimal buffering at every stage</text>

  <rect x="600" y="210" width="220" height="75" rx="10" fill="#e94560" opacity="0.3"/>
  <text x="710" y="237" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">Always-On Streaming</text>
  <text x="710" y="257" text-anchor="middle" fill="#94a3b8" font-size="10">Auto-reconnect with health</text>
  <text x="710" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">monitoring — set it and forget it</text>
</svg>
